<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>闹钟提醒</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: 'Microsoft YaHei', sans-serif;
    }

    #app {
      width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.97);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(180, 170, 210, 0.3);
      display: flex;
      flex-direction: column;
    }

    /* ── 顶部标题栏 ── */
    #header {
      background: linear-gradient(135deg, #9b8ec4, #7a6eaa);
      padding: 13px 16px 11px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #bell {
      font-size: 22px;
      display: inline-block;
      animation: ring 0.6s ease-in-out infinite alternate;
      transform-origin: top center;
    }
    @keyframes ring {
      from { transform: rotate(-18deg); }
      to   { transform: rotate(18deg); }
    }

    #header-text { flex: 1; }
    #title { font-size: 14px; font-weight: 700; color: white; line-height: 1.3; }
    #alarm-time { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 2px; }

    /* ── 内容区 ── */
    #body {
      flex: 1;
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #todo-text {
      font-size: 14px;
      font-weight: 600;
      color: #3c3250;
      line-height: 1.5;
    }

    #note-block {
      font-size: 12px;
      color: rgba(60,50,80,0.65);
      background: rgba(155,142,196,0.1);
      border-left: 3px solid #9b8ec4;
      padding: 6px 10px;
      border-radius: 0 6px 6px 0;
      line-height: 1.5;
      display: none;
    }

    #dismiss-btn {
      margin-top: auto;
      width: 100%;
      height: 36px;
      background: linear-gradient(135deg, #9b8ec4, #7a6eaa);
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      font-family: 'Microsoft YaHei', sans-serif;
      letter-spacing: 0.5px;
      transition: filter 0.15s;
    }
    #dismiss-btn:hover { filter: brightness(1.1); }
    a { color: #7a6eaa; text-decoration: underline; cursor: pointer; word-break: break-all; }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <span id="bell">⏰</span>
      <div id="header-text">
        <div id="title">闹钟提醒</div>
        <div id="alarm-time"></div>
      </div>
    </div>
    <div id="body">
      <div id="todo-text"></div>
      <div id="note-block"></div>
      <button id="dismiss-btn">知道了</button>
    </div>
  </div>

  <script>
    function formatTime(isoStr) {
      const d = new Date(isoStr)
      const pad = n => String(n).padStart(2, '0')
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}  ${pad(d.getHours())}:${pad(d.getMinutes())}`
    }

    function linkify(text) {
      const urlReg = /(https?:\/\/[^\s]+)/g
      return text.replace(urlReg, url => `<a href="${url}">${url}</a>`)
    }

    window.alarmAPI.onInit(({ todoText, note, time }) => {
      document.getElementById('todo-text').innerHTML = linkify(todoText || '')
      document.getElementById('alarm-time').textContent = time ? formatTime(time) : ''

      const noteBlock = document.getElementById('note-block')
      if (note && note.trim()) {
        noteBlock.innerHTML = linkify(note.trim())
        noteBlock.style.display = 'block'
      }
    })

    document.addEventListener('click', (e) => {
      if (e.target.tagName === 'A' && e.target.href) {
        e.preventDefault()
        window.alarmAPI.openExternal(e.target.href)
      }
    })

    document.getElementById('dismiss-btn').addEventListener('click', () => {
      window.alarmAPI.dismiss()
    })
  </script>
</body>
</html>
