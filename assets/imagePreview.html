<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>图片预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.86);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #preview-img {
      max-width: 90vw;
      max-height: 85vh;
      border-radius: 8px;
      box-shadow: 0 8px 48px rgba(0, 0, 0, 0.7);
      transform-origin: center;
      cursor: grab;
      user-select: none;
    }
    #preview-img:active { cursor: grabbing; }
    #toolbar {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(30, 30, 30, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 7px 18px;
      z-index: 10;
    }
    #toolbar button {
      background: none;
      border: none;
      color: #fff;
      font-size: 16px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s;
    }
    #toolbar button:hover { background: rgba(255, 255, 255, 0.18); }
    #zoom-label {
      color: rgba(255, 255, 255, 0.85);
      font-size: 13px;
      min-width: 46px;
      text-align: center;
      font-family: system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <img id="preview-img" src="" alt="" draggable="false" />
  </div>
  <div id="toolbar">
    <button id="btn-out">－</button>
    <span id="zoom-label">100%</span>
    <button id="btn-in">＋</button>
    <button id="btn-reset">⊙</button>
    <button id="btn-close">✕</button>
  </div>

  <script>
    const img     = document.getElementById('preview-img')
    const label   = document.getElementById('zoom-label')
    const overlay = document.getElementById('overlay')
    let zoom = 1, px = 0, py = 0
    const STEP = 0.2

    function apply() {
      img.style.transform = `translate(${px}px, ${py}px) scale(${zoom})`
      label.textContent = Math.round(zoom * 100) + '%'
    }
    function zoomIn()  { zoom = Math.min(8, +(zoom + STEP).toFixed(1)); apply() }
    function zoomOut() { zoom = Math.max(0.1, +(zoom - STEP).toFixed(1)); apply() }
    function reset()   { zoom = 1; px = 0; py = 0; apply() }
    function close()   { window.previewAPI?.close() }

    document.getElementById('btn-in').onclick    = zoomIn
    document.getElementById('btn-out').onclick   = zoomOut
    document.getElementById('btn-reset').onclick = reset
    document.getElementById('btn-close').onclick = close

    overlay.addEventListener('click', e => { if (e.target === overlay) close() })
    overlay.addEventListener('wheel', e => {
      e.preventDefault()
      e.deltaY < 0 ? zoomIn() : zoomOut()
    }, { passive: false })

    img.addEventListener('mousedown', e => {
      if (e.button !== 0) return
      e.preventDefault()
      const sx = e.clientX - px, sy = e.clientY - py
      const onMove = e => { px = e.clientX - sx; py = e.clientY - sy; apply() }
      const onUp   = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp) }
      window.addEventListener('mousemove', onMove)
      window.addEventListener('mouseup', onUp)
    })

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape')               close()
      else if (e.key === '+' || e.key === '=') zoomIn()
      else if (e.key === '-')               zoomOut()
      else if (e.key === '0')               reset()
    })

    window.previewAPI?.onInitImage(src => { img.src = src })
  </script>
</body>
</html>
